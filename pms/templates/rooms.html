{% extends "main.html"%}

{% block content %}
<h1>Habitaciones del hotel</h1>

<form method="get" action="{% url 'rooms' %}">
    <input type="text" name="name" value="{{ name_filter }}" placeholder="Buscar por nombre...">
    <button type="submit">Buscar</button>
    {% if name_filter %}
        <a href="{% url 'rooms' %}">Limpiar</a>
    {% endif %}
</form>
{% for room in rooms%}
<div class="row card mt-3 mb-3 hover-card bg-tr-250">
    <div class="col p-3">
        <div class="">
            {{room.name}} ({{room.room_type__name}})
        </div>
        <div>
            <a href="{% url 'room_details' pk=room.id%}">Ver detalles</a>
        </div>
        
    </div>
    
</div>
{% endfor %}
{% endblock content%}
